apiVersion: workload.nephio.org/v1alpha1
kind: NFDeployment
metadata: # kpt-merge: example/cucp-example
  name: cucp-myran
  namespace: oai-ran-cucp
  annotations:
    internal.kpt.dev/upstream-identifier: 'workload.nephio.org|NFDeployment|example|cucp-example'
spec:
  provider: cucp.openairinterface.org
  parametersRefs:
  - apiVersion: ref.nephio.org/v1alpha1
    kind: Config
    name: cucp-myran-amf-ran
  - apiVersion: workload.nephio.org/v1alpha1
    kind: NFConfig
    name: cucp-nf-config
  networkInstances:
  - name: vpc-cu-e1
    interfaces:
    - e1
  - name: vpc-cudu-f1
    interfaces:
    - f1c
  - name: vpc-ran
    interfaces:
    - n2
  interfaces:
  - name: e1
    ipv4:
      address: 172.4.0.1/16
      gateway: ""
    vlanID: 4
  - name: f1c
    ipv4:
      address: 172.5.0.3/16
      gateway: ""
    vlanID: 2
  - name: n2
    ipv4:
      address: 172.2.1.1/16
      gateway: ""
    vlanID: 3
