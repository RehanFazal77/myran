apiVersion: workload.nephio.org/v1alpha1
kind: NFDeployment
metadata: # kpt-merge: example/cuup-example
  name: cuup-myran
  namespace: oai-ran-cuup
  annotations:
    internal.kpt.dev/upstream-identifier: 'workload.nephio.org|NFDeployment|example|cuup-example'
spec:
  provider: cuup.openairinterface.org
  parametersRefs:
  - apiVersion: ref.nephio.org/v1alpha1
    kind: Config
    name: cuup-myran-cucp-ran
  - apiVersion: workload.nephio.org/v1alpha1
    kind: NFConfig
    name: cuup-nf-config
  networkInstances:
  - name: vpc-cu-e1
    interfaces:
    - e1
  - name: vpc-cudu-f1
    interfaces:
    - f1u
  - name: vpc-internet
    interfaces:
    - n3
  interfaces:
  - name: e1
    ipv4:
      address: 172.4.0.2/16
      gateway: ""
    vlanID: 4
  - name: f1u
    ipv4:
      address: 172.5.0.4/16
      gateway: ""
    vlanID: 2
  - name: n3
    ipv4:
      address: 172.6.0.1/16
      gateway: ""
    vlanID: 5
